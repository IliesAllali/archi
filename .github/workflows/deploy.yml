name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /var/www/arbo

            echo "→ Pull latest code"
            git pull origin main

            echo "→ Install dependencies"
            npm ci --omit=dev

            echo "→ Build Next.js"
            npm run build

            echo "→ Run DB migrations (idempotent)"
            npm run migrate

            echo "→ Reload PM2 (graceful — no downtime)"
            pm2 reload arbo

            echo "✅ Deploy done — $(git log -1 --format='%h %s')"

      - name: Notify on failure
        if: failure()
        run: echo "Deploy failed — check GitHub Actions logs"
