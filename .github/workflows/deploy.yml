name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          script: |
            set -e
            cd ~/arbo-tool

            echo "→ Pull latest code"
            git pull origin main

            echo "→ Build new image"
            docker compose build 2>&1 | tail -5

            echo "→ Swap container (minimal downtime)"
            docker stop arbo-tool 2>/dev/null || true
            docker rm arbo-tool 2>/dev/null || true
            docker compose up -d

            echo "→ Wait for healthy container"
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3002/ > /dev/null 2>&1; then
                echo "✅ Healthy after ${i}x5s"
                break
              fi
              if [ "$i" = "12" ]; then
                echo "❌ Container not healthy after 60s"
                docker logs arbo-tool --tail 20
                exit 1
              fi
              sleep 5
            done

            echo "→ Cleanup old images"
            docker image prune -f > /dev/null 2>&1 || true

            echo "✅ Deploy done — $(git log -1 --format='%h %s')"
