services:
  arbo:
    build: .
    container_name: arbo-tool
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
